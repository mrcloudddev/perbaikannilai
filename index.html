<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Perbaikan Nilai Siswa</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col justify-between relative">

    <!-- Countdown Modal -->
    <div id="countdownModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md flex items-center justify-center z-50 hidden transition-all duration-300">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full mx-4 text-center transform scale-95 transition-transform duration-300">
            <div class="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4 border border-indigo-100 shadow-inner">
                <span id="countdownNumber" class="text-4xl font-black animate-ping">3</span>
            </div>
            <h3 class="text-lg font-bold text-slate-800 mb-1">Memuat Data Nilai Anda</h3>
            <p class="text-xs text-slate-500">Menghubungkan ke server database, mohon tunggu sebentar...</p>
        </div>
    </div>

    <div class="flex-grow flex items-center justify-center p-4">
        
        <!-- Login Card -->
        <div id="loginCard" class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border border-slate-100 transition-all">
            <div class="text-center mb-6">
                <div class="w-12 h-12 bg-indigo-600 text-white rounded-xl flex items-center justify-center mx-auto mb-3 shadow-lg shadow-indigo-200 font-bold text-xl">📄</div>
                <h2 class="text-2xl font-bold text-slate-800">Cek Perbaikan Nilai</h2>
                <p class="text-sm text-slate-500 mt-1">Silakan login menggunakan NISN Anda</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Username / NISN</label>
                    <input type="text" id="username" placeholder="Masukkan NISN" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="password" placeholder="••••••••" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition">
                </div>
                <button onclick="prosesLogin()" id="btnLogin" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl shadow-lg shadow-indigo-100 transition flex justify-center items-center cursor-pointer">
                    Masuk Portal
                </button>
            </div>
        </div>

        <!-- Dashboard Card -->
        <div id="dashboardCard" class="w-full max-w-2xl bg-white p-6 rounded-2xl shadow-xl border border-slate-100 hidden transition-all">
            <div class="flex justify-between items-start border-b border-slate-100 pb-4 mb-6">
                <div>
                    <h3 class="text-xl font-bold text-slate-800" id="txtNama">Nama Siswa</h3>
                    <p class="text-sm text-slate-500" id="txtNISN">NISN: -</p>
                </div>
                <button onclick="logout()" class="text-xs bg-slate-100 hover:bg-red-50 text-slate-600 hover:text-red-600 px-3 py-1.5 rounded-lg font-medium transition cursor-pointer">
                    Keluar
                </button>
            </div>

            <!-- Status Banner - warna berubah sesuai kondisi -->
            <div id="boxStatusMutlak" class="p-4 rounded-xl text-center mb-6 font-bold text-lg">
            </div>

            <h4 class="font-semibold text-slate-700 mb-3 text-sm uppercase tracking-wider">Detail Mata Pelajaran</h4>
            <div id="tabelNilai" class="space-y-3">
            </div>

            <!-- Ringkasan di bawah -->
            <div id="ringkasanMapel" class="mt-4 pt-4 border-t border-slate-100 hidden">
                <div class="flex justify-between text-xs text-slate-500">
                    <span>Total Mata Pelajaran: <strong id="totalMapel" class="text-slate-700">0</strong></span>
                    <span>Tuntas: <strong id="jmlTuntas" class="text-emerald-600">0</strong> | Belum Tuntas: <strong id="jmlBelumTuntas" class="text-rose-600">0</strong></span>
                </div>
            </div>
        </div>

    </div>

    <footer class="text-center py-4 text-xs text-slate-400 border-t border-slate-100 bg-white">
        &copy; 2026 Portal Nilai Mandiri - SMK Sekolah Anda
    </footer>

    <script>
        // MASUKKAN URL APPS SCRIPT ANDA DI SINI
        const API_URL = "https://script.google.com/macros/s/AKfycbzfjCxN4UhIvu98Vl-NXgCbmNe_lilJeCbQmuoln3a-CHlfU2ubnGFLdUeojWr5f27i4w/exec";

        async function prosesLogin() {
            const userBox = document.getElementById('username');
            const passBox = document.getElementById('password');
            const btn = document.getElementById('btnLogin');

            if(!userBox.value || !passBox.value) return alert("Isi semua bidang!");

            btn.disabled = true;
            btn.innerText = "Memverifikasi...";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "login_siswa",
                        username: userBox.value,
                        password: passBox.value
                    })
                });
                const res = await response.json();

                if (res.status === "success") {
                    tampilkanCountdown(res);
                } else {
                    alert(res.message);
                    btn.disabled = false;
                    btn.innerText = "Masuk Portal";
                }
            } catch (err) {
                alert("Gagal terhubung ke server database.");
                btn.disabled = false;
                btn.innerText = "Masuk Portal";
            }
        }

        function tampilkanCountdown(dataDataSiswa) {
            const modal = document.getElementById('countdownModal');
            const numberTxt = document.getElementById('countdownNumber');
            
            modal.classList.remove('hidden');
            
            let hitungan = 3;
            numberTxt.innerText = hitungan;

            const interval = setInterval(() => {
                hitungan--;
                if (hitungan > 0) {
                    numberTxt.innerText = hitungan;
                    numberTxt.classList.remove('animate-ping');
                    void numberTxt.offsetWidth;
                    numberTxt.classList.add('animate-ping');
                } else {
                    clearInterval(interval);
                    modal.classList.add('hidden');
                    renderDashboardSiswa(dataDataSiswa);
                }
            }, 1000);
        }

        function renderDashboardSiswa(res) {
            document.getElementById('loginCard').classList.add('hidden');
            document.getElementById('dashboardCard').classList.remove('hidden');

            document.getElementById('txtNama').innerText = res.user.nama;
            document.getElementById('txtNISN').innerText = "NISN: " + res.user.username;

            const dataNilai = res.user.dataNilai || [];

            // =============================================================
            // LOGIKA NOTIFIKASI BARU:
            // Cek apakah ADA mata pelajaran yang statusnya "BELUM TUNTAS"
            // Jika SEMUA tuntas → banner HIJAU
            // Jika ada yang belum tuntas → banner KUNING/AMBER
            // =============================================================
            const adaBelumTuntas = dataNilai.some(item => {
                const s = item.status.trim().toUpperCase();
                return s === "BELUM TUNTAS" || s === "TIDAK TUNTAS";
            });

            const boxStatus = document.getElementById('boxStatusMutlak');

            if (!adaBelumTuntas && dataNilai.length > 0) {
                // SEMUA TUNTAS → Hijau
                boxStatus.className = "p-4 rounded-xl text-center mb-6 font-bold text-lg bg-emerald-50 text-emerald-700 border border-emerald-200";
                boxStatus.innerText = "✅ PERHATIAN! ANDA TIDAK MEMILIKI PERBAIKAN NILAI";
            } else {
                // ADA YANG BELUM TUNTAS → Amber/Kuning
                boxStatus.className = "p-4 rounded-xl text-center mb-6 font-bold text-lg bg-amber-50 text-amber-700 border border-amber-200";
                boxStatus.innerText = "⚠️ PERHATIAN! ANDA MASIH MEMILIKI PERBAIKAN NILAI";
            }

            // Render tabel semua mapel (support banyak mapel)
            const wadahTabel = document.getElementById('tabelNilai');
            wadahTabel.innerHTML = "";

            if (dataNilai.length === 0) {
                wadahTabel.innerHTML = `<p class="text-center text-slate-400 text-sm py-4">Tidak ada data mata pelajaran terdaftar.</p>`;
            }

            let jmlTuntas = 0;
            let jmlBelumTuntas = 0;

            dataNilai.forEach(item => {
                const statusUpper = item.status.trim().toUpperCase();
                const isTuntas = statusUpper === "TUNTAS" || statusUpper === "TERPENUHI";
                
                if (isTuntas) jmlTuntas++;
                else jmlBelumTuntas++;

                // Badge warna: hijau untuk tuntas, merah untuk belum tuntas
                const badgeColor = isTuntas
                    ? 'bg-emerald-100 text-emerald-800'
                    : 'bg-rose-100 text-rose-800';

                // Ikon status
                const iconStatus = isTuntas ? '✅' : '❌';

                wadahTabel.innerHTML += `
                    <div class="border border-slate-100 rounded-xl p-4 flex flex-col md:flex-row md:items-center justify-between gap-2 hover:bg-slate-50 transition duration-200">
                        <div class="flex items-start gap-3">
                            <span class="text-lg mt-0.5">${iconStatus}</span>
                            <div>
                                <h5 class="font-semibold text-slate-800">${item.mapel}</h5>
                                <p class="text-xs text-slate-500 mt-0.5">${item.catatan || 'Tidak ada catatan khusus'}</p>
                            </div>
                        </div>
                        <div class="pl-8 md:pl-0">
                            <span class="text-xs px-3 py-1.5 rounded-full font-semibold ${badgeColor}">${item.status}</span>
                        </div>
                    </div>
                `;
            });

            // Tampilkan ringkasan
            if (dataNilai.length > 0) {
                document.getElementById('ringkasanMapel').classList.remove('hidden');
                document.getElementById('totalMapel').innerText = dataNilai.length;
                document.getElementById('jmlTuntas').innerText = jmlTuntas;
                document.getElementById('jmlBelumTuntas').innerText = jmlBelumTuntas;
            }
        }

        function logout() {
            window.location.reload();
        }
    </script>
</body>
</html>
